<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타일 선택 — Option A 플로우</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F5;
    min-height: 100vh;
    padding: 60px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .panel {
    width: 340px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #E5E7EB;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .panel-header {
    padding: 16px 16px 10px;
    border-bottom: 1px solid #F3F4F6;
  }
  .panel-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .panel-title { font-size: 15px; font-weight: 700; color: #111827; }
  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: #6B7280;
    background: #F9FAFB;
    border: 1px solid #E5E7EB;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
  }
  .panel-sub { font-size: 11px; color: #9CA3AF; line-height: 1.4; }
  .panel-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Upload — idle */
  .upload-idle {
    width: 100%;
    height: 56px;
    border: 1.5px dashed #A78BFA;
    border-radius: 8px;
    background: #FAFAFF;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .upload-idle:hover { background: #F3F0FF; border-color: #7C3AED; }
  .upload-idle-icon {
    width: 24px; height: 24px;
    background: #EDE9FE;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #6D28D9;
  }
  .upload-idle-text { font-size: 12px; font-weight: 600; color: #6D28D9; }
  .upload-idle-sub { font-size: 11px; color: #9CA3AF; }

  /* Upload — done */
  .upload-done {
    width: 100%;
    height: 56px;
    border: 1.5px solid #7C3AED;
    border-radius: 8px;
    background: #F5F2FF;
    display: none;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
  }
  .upload-thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    background: linear-gradient(135deg, #C8A882 0%, #A07850 100%);
    flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .upload-thumb::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 18px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
  }
  .upload-done-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .upload-done-name { font-size: 12px; font-weight: 600; color: #6D28D9; }
  .upload-done-sub { font-size: 10px; color: #9CA3AF; }
  .upload-change-btn {
    font-size: 11px; font-weight: 500;
    color: #6B7280;
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    flex-shrink: 0;
  }

  /* Divider */
  .divider-label {
    display: flex; align-items: center; gap: 8px; padding: 0 4px;
  }
  .divider-label::before, .divider-label::after {
    content: ''; flex: 1; height: 1px; background: #F3F4F6;
  }
  .divider-label span { font-size: 10px; color: #D1D5DB; white-space: nowrap; }

  /* Grid */
  .style-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .style-card {
    aspect-ratio: 4/3;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .style-card:hover { border-color: #C4B5FD; }
  .style-card.selected { border-color: #7C3AED; }
  .style-card::after {
    content: '';
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 48px;
    background: rgba(255,255,255,0.35);
    border-radius: 4px;
  }

  /* Uploaded image card (first slot) */
  .uploaded-card {
    aspect-ratio: 4/3;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 2px solid #7C3AED;
    background: linear-gradient(135deg, #C8A882 0%, #A07850 100%);
    display: none;
  }
  .uploaded-card::after {
    content: '';
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 48px;
    background: rgba(255,255,255,0.4);
    border-radius: 4px;
  }
  .uploaded-card .card-label {
    position: absolute;
    top: 6px; left: 6px;
    background: rgba(124,58,237,0.85);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    z-index: 1;
  }

  .g1 { background: linear-gradient(135deg, #E8E0D8 0%, #C5B9AF 100%); }
  .g2 { background: linear-gradient(135deg, #D4C5BC 0%, #B8A89E 100%); }
  .g3 { background: linear-gradient(135deg, #EDE8E3 0%, #D4C8C0 100%); }
  .g4 { background: linear-gradient(135deg, #C8BDB8 0%, #A89890 100%); }
  .g5 { background: linear-gradient(135deg, #E0D8D0 0%, #C4B8B0 100%); }
  .g6 { background: linear-gradient(135deg, #D8CEC8 0%, #BEB0A8 100%); }

  /* Footer */
  .panel-footer { padding: 10px 12px 12px; display: flex; gap: 8px; }
  .btn-cancel {
    flex: 1; height: 36px;
    border-radius: 8px;
    border: 1px solid #E5E7EB;
    background: #fff;
    font-size: 13px; font-weight: 500; color: #6B7280;
    cursor: pointer; font-family: 'Pretendard', sans-serif;
  }
  .btn-select {
    flex: 1; height: 36px;
    border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; color: #fff;
    font-family: 'Pretendard', sans-serif;
    transition: background 0.15s;
  }
  .btn-select.on { background: #7C3AED; cursor: pointer; }
  .btn-select.off { background: #D1D5DB; cursor: default; }

  /* Hint */
  .hint {
    font-size: 11px; color: #9CA3AF;
    text-align: center; line-height: 1.6;
  }
</style>
</head>
<body>

  <div style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#1A1F2B;color:#fff;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:100px;white-space:nowrap;pointer-events:none;">⚠️ 스타일 미확정 — 플로우·구조만 참고</div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <span class="panel-title">스타일 선택</span>
        <button class="refresh-btn">↻ 새로고침</button>
      </div>
      <p class="panel-sub">원하는 스타일을 골라주세요. 그 느낌으로 내 제품 배너를 새로 만들어드릴게요</p>
    </div>
    <div class="panel-body">

      <!-- Upload idle -->
      <div class="upload-idle" id="upload-idle" onclick="doUpload()">
        <div class="upload-idle-icon">↑</div>
        <span class="upload-idle-text">내 이미지로 스타일 지정하기</span>
        <span class="upload-idle-sub">클릭 또는 드래그</span>
      </div>

      <!-- Upload done -->
      <div class="upload-done" id="upload-done">
        <div class="upload-thumb"></div>
        <div class="upload-done-info">
          <span class="upload-done-name">내 이미지 · 선택됨</span>
          <span class="upload-done-sub">스타일 레퍼런스로 사용</span>
        </div>
        <button class="upload-change-btn" onclick="resetUpload()">변경</button>
      </div>

      <div class="divider-label"><span>또는 추천 스타일 선택</span></div>

      <div class="style-grid" id="grid">
        <!-- 업로드 후 첫번째 슬롯에 삽입됨 -->
        <div class="uploaded-card" id="uploaded-card" onclick="selectCard(this)">
          <span class="card-label">내 이미지</span>
        </div>
        <div class="style-card g1" onclick="selectCard(this)"></div>
        <div class="style-card g2" onclick="selectCard(this)"></div>
        <div class="style-card g3" onclick="selectCard(this)"></div>
        <div class="style-card g4" onclick="selectCard(this)"></div>
        <div class="style-card g5" onclick="selectCard(this)"></div>
        <div class="style-card g6" onclick="selectCard(this)"></div>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-cancel">취소</button>
      <button class="btn-select off" id="btn-select">선택</button>
    </div>
  </div>

  <p class="hint" id="hint">업로드 영역을 클릭해보세요</p>

<script>
  function doUpload() {
    document.getElementById('upload-idle').style.display = 'none';
    document.getElementById('upload-done').style.display = 'flex';
    const card = document.getElementById('uploaded-card');
    card.style.display = 'block';
    selectCard(card);
    document.getElementById('hint').textContent = '추천 스타일을 클릭하면 전환돼요';
  }

  function resetUpload() {
    document.getElementById('upload-idle').style.display = 'flex';
    document.getElementById('upload-done').style.display = 'none';
    const card = document.getElementById('uploaded-card');
    card.style.display = 'none';
    card.classList.remove('selected');
    document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('btn-select').className = 'btn-select off';
    document.getElementById('hint').textContent = '업로드 영역을 클릭해보세요';
  }

  function selectCard(el) {
    document.querySelectorAll('.style-card, .uploaded-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('btn-select').className = 'btn-select on';
  }
</script>

</body>
</html>
