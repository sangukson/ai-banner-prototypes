<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타일 업로드 버튼 위치 비교</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F5;
    display: flex;
    gap: 40px;
    padding: 40px;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  .column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .label {
    font-size: 13px;
    font-weight: 600;
    color: #6B7280;
    letter-spacing: 0.02em;
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.01em;
  }
  .badge.recommended { background: #EDE9FE; color: #6D28D9; }
  .badge.alt { background: #F3F4F6; color: #6B7280; }

  /* Panel */
  .panel {
    width: 340px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #E5E7EB;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  .panel-header {
    padding: 16px 16px 10px;
    border-bottom: 1px solid #F3F4F6;
  }

  .panel-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 700;
    color: #111827;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: #6B7280;
    background: #F9FAFB;
    border: 1px solid #E5E7EB;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
  }

  .panel-sub {
    font-size: 11px;
    color: #9CA3AF;
    line-height: 1.4;
  }

  .panel-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Upload area — full width */
  .upload-full {
    width: 100%;
    height: 56px;
    border: 1.5px dashed #A78BFA;
    border-radius: 8px;
    background: #FAFAFF;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .upload-full:hover {
    background: #F3F0FF;
    border-color: #7C3AED;
  }
  .upload-full-icon {
    width: 24px;
    height: 24px;
    background: #EDE9FE;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #6D28D9;
  }
  .upload-full-text {
    font-size: 12px;
    font-weight: 600;
    color: #6D28D9;
  }
  .upload-full-sub {
    font-size: 11px;
    color: #9CA3AF;
  }

  /* Style grid */
  .style-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .style-card {
    aspect-ratio: 4/3;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .style-card:hover { border-color: #C4B5FD; }
  .style-card.selected { border-color: #7C3AED; }

  /* Gradient placeholders mimicking product photos */
  .g1 { background: linear-gradient(135deg, #E8E0D8 0%, #C5B9AF 100%); }
  .g2 { background: linear-gradient(135deg, #D4C5BC 0%, #B8A89E 100%); }
  .g3 { background: linear-gradient(135deg, #EDE8E3 0%, #D4C8C0 100%); }
  .g4 { background: linear-gradient(135deg, #C8BDB8 0%, #A89890 100%); }
  .g5 { background: linear-gradient(135deg, #E0D8D0 0%, #C4B8B0 100%); }
  .g6 { background: linear-gradient(135deg, #D8CEC8 0%, #BEB0A8 100%); }

  /* Product image simulation */
  .style-card::after {
    content: '';
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 48px;
    background: rgba(255,255,255,0.35);
    border-radius: 4px;
    backdrop-filter: blur(2px);
  }

  /* Upload card — first grid cell */
  .upload-card {
    aspect-ratio: 4/3;
    border-radius: 6px;
    border: 1.5px dashed #A78BFA;
    background: #FAFAFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .upload-card:hover {
    background: #F3F0FF;
    border-color: #7C3AED;
  }
  .upload-card-icon {
    font-size: 18px;
    color: #7C3AED;
  }
  .upload-card-text {
    font-size: 10px;
    font-weight: 600;
    color: #7C3AED;
    text-align: center;
    line-height: 1.3;
  }

  /* Panel footer */
  .panel-footer {
    padding: 10px 12px 12px;
    display: flex;
    gap: 8px;
  }

  .btn-cancel {
    flex: 1;
    height: 36px;
    border-radius: 8px;
    border: 1px solid #E5E7EB;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: #6B7280;
    cursor: pointer;
  }
  .btn-select {
    flex: 1;
    height: 36px;
    border-radius: 8px;
    border: none;
    background: #7C3AED;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
  }

  /* Divider label */
  .divider-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
  }
  .divider-label::before, .divider-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #F3F4F6;
  }
  .divider-label span {
    font-size: 10px;
    color: #D1D5DB;
    white-space: nowrap;
  }

  /* Pros */
  .pros {
    font-size: 11px;
    color: #6B7280;
    line-height: 1.6;
    max-width: 340px;
    text-align: center;
  }
  .pros strong { color: #374151; }
</style>
</head>
<body>

<!-- Option A -->
<div class="column">
  <div class="label">Option A</div>
  <span class="badge recommended">추천</span>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <span class="panel-title">스타일 선택</span>
        <button class="refresh-btn">↻ 새로고침</button>
      </div>
      <p class="panel-sub">원하는 스타일을 골라주세요. 그 느낌으로 내 제품 배너를 새로 만들어드릴게요</p>
    </div>
    <div class="panel-body">
      <!-- Upload: full width row -->
      <div class="upload-full">
        <div class="upload-full-icon">↑</div>
        <span class="upload-full-text">내 이미지로 스타일 지정하기</span>
        <span class="upload-full-sub">클릭 또는 드래그</span>
      </div>
      <!-- Divider -->
      <div class="divider-label"><span>또는 추천 스타일 선택</span></div>
      <!-- Grid -->
      <div class="style-grid">
        <div class="style-card g1 selected"></div>
        <div class="style-card g2"></div>
        <div class="style-card g3"></div>
        <div class="style-card g4"></div>
        <div class="style-card g5"></div>
        <div class="style-card g6"></div>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-cancel">취소</button>
      <button class="btn-select">선택</button>
    </div>
  </div>
  <p class="pros">
    업로드 영역이 넓어 <strong>드래그&드롭 가능</strong><br>
    추천 스타일과 개념적으로 <strong>명확히 분리</strong><br>
    추천 이미지 노출 우선순위 유지
  </p>
</div>

<!-- Option B -->
<div class="column">
  <div class="label">Option B</div>
  <span class="badge alt">대안</span>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <span class="panel-title">스타일 선택</span>
        <button class="refresh-btn">↻ 새로고침</button>
      </div>
      <p class="panel-sub">원하는 스타일을 골라주세요. 그 느낌으로 내 제품 배너를 새로 만들어드릴게요</p>
    </div>
    <div class="panel-body">
      <!-- Grid: upload as first card -->
      <div class="style-grid">
        <div class="upload-card">
          <span class="upload-card-icon">＋</span>
          <span class="upload-card-text">내 이미지<br>업로드</span>
        </div>
        <div class="style-card g1 selected"></div>
        <div class="style-card g2"></div>
        <div class="style-card g3"></div>
        <div class="style-card g4"></div>
        <div class="style-card g5"></div>
        <div class="style-card g6"></div>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-cancel">취소</button>
      <button class="btn-select">선택</button>
    </div>
  </div>
  <p class="pros">
    선택지가 <strong>병렬 배치</strong>라 단순함<br>
    업로드와 추천이 <strong>동등한 선택지</strong> 느낌<br>
    추천 1번 이미지가 밀려 <strong>시선 분산</strong>
  </p>
</div>

</body>
</html>
