<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콘텐츠 배너 설정 — 디바이스 미리보기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #EBEBEB;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 72px 24px 48px;
  }

  .panel {
    width: 320px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #E5E7EB;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    overflow: hidden;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #F3F4F6;
  }
  .panel-title { font-size: 14px; font-weight: 700; color: #111827; }
  .close-btn {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    color: #9CA3AF; font-size: 16px; cursor: pointer;
    border: none; background: none; border-radius: 4px;
  }
  .close-btn:hover { background: #F3F4F6; }

  .panel-body { padding: 16px; display: flex; flex-direction: column; gap: 24px; }

  .section-label {
    font-size: 12px; font-weight: 600; color: #374151;
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 10px;
  }
  .required { color: #EF4444; font-size: 11px; font-weight: 500; }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid #F3F4F6;
    margin-bottom: 12px;
  }
  .tab {
    flex: 1; text-align: center;
    padding: 6px 0;
    font-size: 12px; font-weight: 500;
    color: #9CA3AF; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active { color: #7C3AED; border-bottom-color: #7C3AED; font-weight: 600; }

  /* Mockup container — 확대 버튼 */
  .mockup-container {
    position: relative;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .mockup-container:hover .expand-overlay { opacity: 1; }
  .expand-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.18);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 1;
  }
  .expand-btn {
    background: rgba(255,255,255,0.92);
    border: none; border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px; font-weight: 600; color: #374151;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  /* PC Browser Mockup */
  .browser-wrap {
    border: 1.5px solid #E5E7EB;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }
  .browser-bar {
    background: #F9FAFB;
    padding: 5px 8px;
    display: flex; align-items: center; gap: 4px;
    border-bottom: 1px solid #E5E7EB;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-r { background: #FCA5A5; }
  .dot-y { background: #FCD34D; }
  .dot-g { background: #6EE7B7; }
  .url-bar { flex: 1; height: 12px; background: #E5E7EB; border-radius: 3px; margin-left: 4px; }
  .browser-banner { width: 100%; height: 52px; display: block; transition: background 0.2s; }
  .browser-body {
    padding: 8px;
    display: flex; flex-direction: column; gap: 5px;
    background: #F9FAFB;
  }
  .sk { height: 6px; background: #E5E7EB; border-radius: 3px; }
  .sk.s { width: 55%; }
  .sk-row { display: flex; gap: 4px; }
  .sk-card { flex: 1; height: 28px; background: #E5E7EB; border-radius: 4px; }

  /* Mobile Phone Mockup */
  .phone-wrap {
    display: flex; justify-content: center;
  }
  .phone {
    width: 110px;
    border: 2px solid #D1D5DB;
    border-radius: 18px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .phone-top {
    background: #F9FAFB;
    padding: 6px 0 4px;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid #F3F4F6;
  }
  .phone-notch { width: 28px; height: 4px; background: #D1D5DB; border-radius: 2px; }
  .phone-banner { width: 100%; height: 62px; display: block; transition: background 0.2s; }
  .phone-body {
    padding: 6px;
    display: flex; flex-direction: column; gap: 4px;
    background: #F9FAFB;
  }
  .psk { height: 5px; background: #E5E7EB; border-radius: 2px; }
  .psk.s { width: 50%; }
  .psk-row { display: flex; gap: 3px; margin-top: 2px; }
  .psk-card { flex: 1; height: 22px; background: #E5E7EB; border-radius: 3px; }

  /* Banner grid */
  .banner-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; margin-bottom: 10px;
  }
  .banner-card {
    border-radius: 6px; height: 60px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
    user-select: none; position: relative;
  }
  .banner-card:hover { transform: scale(1.02); }
  .banner-card.selected { border-color: #7C3AED; box-shadow: 0 0 0 1px #7C3AED; }
  .banner-card.selected::after {
    content: '✓';
    position: absolute; top: 4px; right: 4px;
    width: 16px; height: 16px;
    background: #7C3AED; color: #fff;
    border-radius: 50%; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .b1 { background: linear-gradient(135deg, #a8edea, #fed6e3); }
  .b2 { background: linear-gradient(135deg, #c3aed6, #f9e4b7); }
  .b3 { background: linear-gradient(135deg, #89f7fe, #66a6ff); }
  .b4 { background: linear-gradient(135deg, #fddb92, #d1fdff); }

  /* Buttons */
  .btn-apply {
    width: 100%; height: 36px;
    background: #7C3AED; color: #fff;
    font-size: 13px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    margin-bottom: 6px; transition: background 0.15s;
  }
  .btn-apply:hover:not(:disabled) { background: #6D28D9; }
  .btn-apply:disabled { background: #C4B5FD; cursor: not-allowed; }
  .btn-more {
    width: 100%; height: 34px;
    background: #fff; color: #7C3AED;
    font-size: 12px; font-weight: 600;
    border: 1.5px dashed #C4B5FD; border-radius: 8px;
    cursor: pointer; font-family: 'Pretendard', sans-serif;
    transition: background 0.15s;
  }
  .btn-more:hover { background: #F5F2FF; }

  /* 모바일 자르기 버튼 */
  .btn-crop {
    width: 100%; height: 34px;
    background: #fff; color: #374151;
    font-size: 12px; font-weight: 600;
    border: 1.5px solid #E5E7EB; border-radius: 8px;
    cursor: pointer; font-family: 'Pretendard', sans-serif;
    margin-bottom: 6px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-crop:hover { border-color: #7C3AED; color: #7C3AED; background: #FAFAFF; }

  /* 모바일 hint */
  .mo-hint {
    font-size: 11px; color: #9CA3AF; line-height: 1.5;
    margin-bottom: 10px;
  }
  .crop-done-badge {
    display: none;
    align-items: center; gap: 4px;
    font-size: 11px; color: #059669; font-weight: 600;
    margin-bottom: 8px;
  }
  .crop-done-badge.show { display: flex; }

  /* Upload */
  .upload-area {
    border: 1.5px dashed #D1D5DB; border-radius: 8px;
    height: 72px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    margin-bottom: 10px;
  }
  .upload-area:hover { border-color: #7C3AED; background: #FAFAFF; }
  .upload-text { font-size: 11px; color: #9CA3AF; }

  .panel-footer { padding: 0 16px 16px; }
  .footer-label { font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .text-input {
    width: 100%; height: 36px;
    border: 1px solid #E5E7EB; border-radius: 8px;
    padding: 0 10px; font-size: 12px;
    font-family: 'Pretendard', sans-serif; color: #374151; outline: none;
  }
  .text-input:focus { border-color: #7C3AED; }

  .divider { height: 1px; background: #F3F4F6; margin: 0 -16px; }

  /* ── 전체화면 모달 ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(17,24,39,0.72);
    z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }

  .modal-inner {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute; top: -40px; right: 0;
    background: rgba(255,255,255,0.12);
    border: none; border-radius: 50%;
    width: 32px; height: 32px;
    color: #fff; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: rgba(255,255,255,0.22); }

  /* 모달 — PC 브라우저 */
  .modal-browser {
    width: 560px;
    border: 2px solid #D1D5DB;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .modal-browser-bar {
    background: #F3F4F6;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid #E5E7EB;
  }
  .modal-dot { width: 10px; height: 10px; border-radius: 50%; }
  .modal-url {
    flex: 1; height: 18px;
    background: #E5E7EB; border-radius: 4px; margin-left: 8px;
  }
  .modal-browser-banner { width: 100%; height: 120px; display: block; }
  .modal-browser-body {
    padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    background: #F9FAFB;
  }
  .msk { height: 10px; background: #E5E7EB; border-radius: 4px; }
  .msk.s { width: 50%; }
  .msk-row { display: flex; gap: 8px; margin-top: 4px; }
  .msk-card { flex: 1; height: 52px; background: #E5E7EB; border-radius: 6px; }

  .modal-label {
    color: rgba(255,255,255,0.6);
    font-size: 12px; font-weight: 500;
  }

  /* ── 크롭 모달 ── */
  .crop-modal {
    width: 500px;
    background: #1E2433;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .crop-modal-header {
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .crop-title {
    font-size: 14px; font-weight: 700; color: #fff;
    margin-bottom: 3px;
  }
  .crop-sub {
    font-size: 11px; color: rgba(255,255,255,0.45);
  }
  .ratio-tabs {
    display: flex; gap: 4px; flex-shrink: 0;
  }
  .ratio-tab {
    padding: 5px 10px;
    font-size: 12px; font-weight: 600;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: transparent;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }
  .ratio-tab.active {
    border-color: #7C3AED;
    color: #fff;
    background: rgba(124,58,237,0.25);
  }
  .ratio-tab:hover:not(.active) {
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
  }

  /* 크롭 이미지 영역 */
  .crop-area {
    position: relative;
    width: 500px;
    height: 200px;
    overflow: hidden;
    cursor: crosshair;
  }
  .crop-image {
    width: 100%; height: 100%; display: block;
  }
  .crop-box {
    position: absolute;
    border: 1.5px solid #fff;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
    z-index: 2;
    transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    cursor: move;
  }
  .grid-lines { position: absolute; inset: 0; }
  .grid-v, .grid-h { position: absolute; background: rgba(255,255,255,0.22); }
  .grid-v { width: 1px; top: 0; bottom: 0; }
  .grid-v:nth-child(1) { left: 33.33%; }
  .grid-v:nth-child(2) { left: 66.66%; }
  .grid-h { height: 1px; left: 0; right: 0; }
  .grid-h:nth-child(3) { top: 33.33%; }
  .grid-h:nth-child(4) { top: 66.66%; }
  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: #fff; border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2.5px 0 0 2.5px; }
  .corner.tr { top: -1px; right: -1px; border-width: 2.5px 2.5px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2.5px 2.5px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2.5px 2.5px 0; }

  .crop-footer {
    padding: 12px 20px 16px;
    display: flex; gap: 8px; justify-content: flex-end;
    align-items: center;
  }
  .crop-footer-left {
    flex: 1;
    font-size: 11px; color: rgba(255,255,255,0.35);
  }
  .crop-cancel {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }
  .crop-cancel:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
  .crop-done {
    padding: 8px 20px;
    border-radius: 8px; border: none;
    background: #7C3AED;
    font-size: 13px; font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: background 0.15s;
  }
  .crop-done:hover { background: #6D28D9; }
</style>
</head>
<body>

<div style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#1A1F2B;color:#fff;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:100px;white-space:nowrap;pointer-events:none;">⚠️ 스타일 미확정 — 플로우·구조만 참고</div>

<div class="panel">
  <div class="panel-header">
    <span class="panel-title">콘텐츠 배너 설정</span>
    <button class="close-btn">✕</button>
  </div>

  <div class="panel-body">

    <!-- PC 이미지 -->
    <div>
      <div class="section-label">PC 이미지 <span class="required">*필수</span></div>
      <div class="tabs" id="pc-tabs">
        <div class="tab" onclick="switchTab('pc','upload')">직접 업로드</div>
        <div class="tab active" onclick="switchTab('pc','ai')">✦ AI 배너</div>
      </div>

      <div id="pc-upload" style="display:none;">
        <div class="upload-area">
          <span class="upload-text">이미지를 드래그하거나 클릭해서 업로드</span>
          <span class="upload-text" style="color:#D1D5DB;font-size:10px;">PNG, JPG · 최대 10MB</span>
        </div>
      </div>

      <div id="pc-ai">
        <div class="mockup-container" onclick="openModal('pc')">
          <div class="browser-wrap">
            <div class="browser-bar">
              <div class="dot dot-r"></div>
              <div class="dot dot-y"></div>
              <div class="dot dot-g"></div>
              <div class="url-bar"></div>
            </div>
            <div id="pc-preview" class="browser-banner b1"></div>
            <div class="browser-body">
              <div class="sk"></div>
              <div class="sk s"></div>
              <div class="sk-row">
                <div class="sk-card"></div>
                <div class="sk-card"></div>
                <div class="sk-card"></div>
              </div>
            </div>
          </div>
          <div class="expand-overlay">
            <button class="expand-btn">⛶ 크게 보기</button>
          </div>
        </div>

        <div class="banner-grid" id="pc-grid">
          <div class="banner-card b1 selected" onclick="selectBanner(this,'b1')"></div>
          <div class="banner-card b2" onclick="selectBanner(this,'b2')"></div>
          <div class="banner-card b3" onclick="selectBanner(this,'b3')"></div>
          <div class="banner-card b4" onclick="selectBanner(this,'b4')"></div>
        </div>
        <button class="btn-apply">적용하기</button>
        <button class="btn-more">✦ AI 배너 더 생성하기</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 모바일 이미지 -->
    <div>
      <div class="section-label">모바일 이미지</div>
      <div class="tabs" id="mo-tabs">
        <div class="tab" onclick="switchTab('mo','upload')">직접 업로드</div>
        <div class="tab active" onclick="switchTab('mo','ai')">✦ AI 배너</div>
      </div>

      <div id="mo-upload" style="display:none;">
        <div class="upload-area">
          <span class="upload-text">이미지를 드래그하거나 클릭해서 업로드</span>
          <span class="upload-text" style="color:#D1D5DB;font-size:10px;">PNG, JPG · 최대 10MB</span>
        </div>
      </div>

      <div id="mo-ai">
        <div class="mockup-container" onclick="openModal('mo')">
          <div class="phone-wrap">
            <div class="phone">
              <div class="phone-top"><div class="phone-notch"></div></div>
              <div id="mo-preview" class="phone-banner b1"></div>
              <div class="phone-body">
                <div class="psk"></div>
                <div class="psk s"></div>
                <div class="psk-row">
                  <div class="psk-card"></div>
                  <div class="psk-card"></div>
                </div>
                <div class="psk-row">
                  <div class="psk-card"></div>
                  <div class="psk-card"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="expand-overlay">
            <button class="expand-btn">✂ 자르기</button>
          </div>
        </div>

        <div class="banner-grid" id="mo-grid">
          <div class="banner-card b1 selected" onclick="selectBanner('mo',this,'b1')"></div>
          <div class="banner-card b2" onclick="selectBanner('mo',this,'b2')"></div>
          <div class="banner-card b3" onclick="selectBanner('mo',this,'b3')"></div>
          <div class="banner-card b4" onclick="selectBanner('mo',this,'b4')"></div>
        </div>
        <div class="crop-done-badge" id="crop-badge">
          <span>✓</span> 4:3 비율로 잘렸어요
        </div>
        <button class="btn-crop" onclick="openModal('mo')">✂ 모바일용으로 자르기</button>
        <button class="btn-apply" id="mo-apply" disabled>적용하기</button>
      </div>
    </div>

  </div>

  <div class="panel-footer">
    <div class="footer-label">소재목</div>
    <input class="text-input" type="text" placeholder="소재목">
  </div>
</div>

<!-- 모달 -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal-inner" id="modal-inner">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <!-- PC 모달: 브라우저 목업 미리보기 -->
    <div id="modal-pc" style="display:none;">
      <div class="modal-browser">
        <div class="modal-browser-bar">
          <div class="modal-dot dot-r"></div>
          <div class="modal-dot dot-y"></div>
          <div class="modal-dot dot-g"></div>
          <div class="modal-url"></div>
        </div>
        <div id="modal-pc-banner" class="modal-browser-banner b1"></div>
        <div class="modal-browser-body">
          <div class="msk"></div>
          <div class="msk s"></div>
          <div class="msk-row">
            <div class="msk-card"></div>
            <div class="msk-card"></div>
            <div class="msk-card"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 모바일 모달: 크롭 UI -->
    <div id="modal-mo" style="display:none;">
      <div class="crop-modal">
        <div class="crop-modal-header">
          <div>
            <div class="crop-title">모바일용 사진 자르기</div>
            <div class="crop-sub">비율을 선택하거나 영역을 조정하세요</div>
          </div>
          <div class="ratio-tabs">
            <button class="ratio-tab active" onclick="setRatio('4:3', this)">4:3</button>
            <button class="ratio-tab" onclick="setRatio('3:4', this)">3:4</button>
            <button class="ratio-tab" onclick="setRatio('16:9', this)">16:9</button>
          </div>
        </div>
        <div class="crop-area" id="crop-area">
          <div id="crop-image" class="crop-image b1"></div>
          <div class="crop-box" id="crop-box">
            <div class="grid-lines">
              <div class="grid-v"></div>
              <div class="grid-v"></div>
              <div class="grid-h"></div>
              <div class="grid-h"></div>
            </div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
        <div class="crop-footer">
          <span class="crop-footer-left" id="crop-ratio-label">4:3 비율로 자르기</span>
          <button class="crop-cancel" onclick="closeModal()">취소</button>
          <button class="crop-done" onclick="doneCrop()">자르기 완료</button>
        </div>
      </div>
    </div>

    <span class="modal-label" id="modal-label"></span>
  </div>
</div>

<script>
  let currentColor = { pc: 'b1', mo: 'b1' };
  let currentRatio = '4:3';
  let cropDone = false;

  const CROP_AREA_W = 500;
  const CROP_AREA_H = 200;

  const ratioConfigs = {
    '4:3':  { w: 213, h: 160 },
    '3:4':  { w: 120, h: 160 },
    '16:9': { w: 284, h: 160 },
  };
  const ratioLabels = {
    '4:3': '4:3 비율로 자르기',
    '3:4': '3:4 비율로 자르기',
    '16:9': '16:9 비율로 자르기',
  };
  const ratioKo = { '4:3': '4:3', '3:4': '3:4', '16:9': '16:9' };

  function switchTab(section, type) {
    const tabs = document.getElementById(section + '-tabs').querySelectorAll('.tab');
    tabs[0].classList.toggle('active', type === 'upload');
    tabs[1].classList.toggle('active', type === 'ai');
    document.getElementById(section + '-upload').style.display = type === 'upload' ? 'block' : 'none';
    document.getElementById(section + '-ai').style.display = type === 'ai' ? 'block' : 'none';
  }

  function selectBanner(section, el, colorClass) {
    document.getElementById(section + '-grid').querySelectorAll('.banner-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    currentColor[section] = colorClass;

    if (section === 'pc') {
      document.getElementById('pc-preview').className = 'browser-banner ' + colorClass;
    } else {
      document.getElementById('mo-preview').className = 'phone-banner ' + colorClass;
      // 모바일 이미지 바뀌면 크롭 리셋
      if (cropDone) {
        cropDone = false;
        document.getElementById('crop-badge').classList.remove('show');
        document.getElementById('mo-apply').disabled = true;
      }
    }
  }

  function openModal(section) {
    document.getElementById('modal-pc').style.display = section === 'pc' ? 'block' : 'none';
    document.getElementById('modal-mo').style.display = section === 'mo' ? 'block' : 'none';
    const label = document.getElementById('modal-label');

    if (section === 'pc') {
      document.getElementById('modal-pc-banner').className = 'modal-browser-banner ' + currentColor.pc;
      label.textContent = 'PC 배너 미리보기';
      label.style.display = '';
    } else {
      document.getElementById('crop-image').className = 'crop-image ' + currentColor.mo;
      currentRatio = '4:3';
      document.querySelectorAll('.ratio-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
      document.getElementById('crop-ratio-label').textContent = ratioLabels['4:3'];
      updateCropBox();
      label.style.display = 'none';
    }

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function setRatio(ratio, el) {
    currentRatio = ratio;
    document.querySelectorAll('.ratio-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('crop-ratio-label').textContent = ratioLabels[ratio];
    updateCropBox();
  }

  function updateCropBox() {
    const cfg = ratioConfigs[currentRatio];
    const box = document.getElementById('crop-box');
    box.style.width = cfg.w + 'px';
    box.style.height = cfg.h + 'px';
    box.style.left = ((CROP_AREA_W - cfg.w) / 2) + 'px';
    box.style.top = ((CROP_AREA_H - cfg.h) / 2) + 'px';
  }

  function doneCrop() {
    cropDone = true;
    closeModal();
    const badge = document.getElementById('crop-badge');
    badge.textContent = '';
    badge.innerHTML = '<span>✓</span> ' + ratioKo[currentRatio] + ' 비율로 잘렸어요';
    badge.classList.add('show');
    document.getElementById('mo-apply').disabled = false;
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // 초기 크롭박스 위치 설정
  updateCropBox();
</script>

</body>
</html>
